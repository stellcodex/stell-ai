name: boundary-gate

on:
  push:
  pull_request:

jobs:
  verify-boundary-layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: verify-required-roots
        run: |
          set -euo pipefail
          for d in src docs deploy scripts tests; do
            test -d "$d" || { echo "missing:$d"; exit 1; }
          done
          echo "PASS boundary layout"

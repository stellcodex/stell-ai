name: boundary-gate

on:
  push:
  pull_request:

jobs:
  verify-boundary-layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: verify-canonical-stell-ai-layout
        run: |
          set -euo pipefail
          for d in docs runtime_app; do
            test -d "$d" || { echo "missing:$d"; exit 1; }
          done
          test -f Dockerfile || { echo "missing:Dockerfile"; exit 1; }
          test -f requirements.txt || { echo "missing:requirements.txt"; exit 1; }
          echo "PASS canonical STELL.AI boundary layout"
